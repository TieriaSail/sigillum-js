name: Sync to Gitee

on:
  push:
    branches: [main, dev]
    tags: ['v*']

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Mirror to Gitee
        uses: wearerequired/git-mirror-action@v1
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GITEE_SSH_KEY }}
        with:
          source-repo: 'https://github.com/TieriaSail/sigillum-js.git'
          destination-repo: 'git@gitee.com:TieriaSail/sigillum-js.git'

